<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>홍선기의 디지털 백과사전</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'맑은 고딕',sans-serif;
background:#eef4ff;
color:#222;
line-height:1.7;
padding:40px 20px;
}

.container{
max-width:1000px;
margin:auto;
}

header{
background:linear-gradient(135deg,#1b4b7a,#2c77c7);
color:white;
padding:50px;
border-radius:20px;
margin-bottom:30px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

header h1{
font-size:3rem;
margin-bottom:10px;
}

header p{
font-size:1.1rem;
opacity:.9;
}

.section{
background:white;
padding:30px;
border-radius:20px;
margin-bottom:25px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.section h2{
margin-bottom:20px;
color:#1b4b7a;
}

.keyword-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
}

.keyword{
display:block;
text-decoration:none;
padding:20px;
border-radius:15px;
font-size:1.1rem;
font-weight:bold;
color:white;
transition:.2s;
}

.keyword:hover{
transform:translateY(-5px);
}

.blue{background:#3b82f6;}
.orange{background:#f97316;}
.green{background:#22c55e;}
.purple{background:#8b5cf6;}
.red{background:#ef4444;}
.pink{background:#ec4899;}

.category{
display:inline-block;
padding:8px 15px;
background:#dbeafe;
border-radius:999px;
margin:5px;
font-weight:bold;
}

footer{
text-align:center;
margin-top:30px;
color:#666;
}

p a{
color:#2563eb;
font-weight:bold;
text-decoration:none;
}

p a:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div class="container">

<header>

<!-- 학생 수정 ① -->

<h1>🌟 홍선기의 디지털 백과사전</h1>

<p>
만화, 영화, 사랑, 꿈을 기록한
나만의 디지털 백과사전
</p>

</header>

<div class="section">

<h2>📖 나를 소개합니다</h2>

<!-- 학생 수정 ② -->

<p>
안녕하세요!<br>

저는
<a href="comic.html">만화</a>
와
<a href="movie.html">영화</a>
속에 담긴 주인공들의
<a href="dream.html">꿈</a>
과
<a href="love.html">사랑</a>
을 좋아합니다.<br><br>

장래희망은 프리랜서 작가입니다.<br>
이 백과사전은 저를 설명하는<br>
단어들을 모아 만든 사이트입니다.
</p>

</div>

<div class="section">

<h2>🗂 나의 분류 체계</h2>

<span class="category">📚 만화</span>
<span class="category">🎬 영화</span>
<span class="category">💗 사랑</span>
<span class="category">💭 꿈</span>

</div>

<div class="section">

<h2>🔗 키워드 바로가기</h2>

<div class="keyword-grid">

<a class="keyword blue" href="comic.html">
📚 만화
</a>

<a class="keyword orange" href="movie.html">
🎬 영화
</a>

<a class="keyword green" href="love.html">
💗 사랑
</a>

<a class="keyword purple" href="dream.html">
💭 꿈
</a>
</a>

</div>

</div>

<footer>

대동운부군옥 2.0
나만의 디지털 백과사전 만들기

</footer>

</div>

</body>
</html>
